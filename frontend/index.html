<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 다크 레드 테마 (기본) ── */
[data-theme="dark"] {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --card: #141414;
  --border: #222;
  --border2: #333;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #ff2d2d;
  --accent2: #ff6b2d;
  --green: #00e676;
  --footer-bg: #0d0d0d;
  --footer-border: #1e1e1e;
  --chip-bg: #1a1a1a;
  --chip-active-bg: #ff2d2d;
  --chip-active-border: #ff2d2d;
  --chip-active-color: #fff;
  --tg-bg: rgba(42,171,238,0.12);
  --tg-border: rgba(42,171,238,0.35);
  --yt-bg: rgba(255,0,0,0.12);
  --yt-border: rgba(255,0,0,0.35);
  --toggle-bg: #1a1a1a;
  --toggle-border: #333;
  --toggle-icon: ☀️;
  --card-shadow: none;
  --card-shadow-hover: 0 8px 32px rgba(255,45,45,0.12);
  --skeleton-from: #1a1a1a;
  --skeleton-to: #222;
}

/* ── 화이트 테마 ── */
[data-theme="light"] {
  --bg: #f7f6f3;
  --bg2: #ffffff;
  --bg3: #f0efe9;
  --card: #ffffff;
  --border: #e8e8e4;
  --border2: #d8d8d2;
  --text: #111111;
  --text2: #555555;
  --text3: #999999;
  --accent: #e63329;
  --accent2: #ff6b35;
  --green: #1a8c5b;
  --footer-bg: #111111;
  --footer-border: #222222;
  --chip-bg: #ffffff;
  --chip-active-bg: #111111;
  --chip-active-border: #111111;
  --chip-active-color: #ffffff;
  --tg-bg: rgba(42,171,238,0.08);
  --tg-border: rgba(42,171,238,0.3);
  --yt-bg: rgba(255,0,0,0.08);
  --yt-border: rgba(255,0,0,0.3);
  --toggle-bg: #ffffff;
  --toggle-border: #e0e0d8;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --card-shadow-hover: 0 8px 40px rgba(0,0,0,0.12);
  --skeleton-from: #eeede8;
  --skeleton-to: #e4e3dd;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ── 티커 ── */
.ticker-wrap {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  overflow: hidden;
  height: 32px;
  display: flex;
  align-items: center;
}

.ticker-track {
  display: flex;
  animation: ticker 30s linear infinite;
  white-space: nowrap;
}

@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  font-size: 12px;
  font-weight: 700;
  color: white;
  padding: 0 2rem;
  letter-spacing: 0.02em;
}

.ticker-sep { color: rgba(255,255,255,0.4); padding: 0 0.4rem; }

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s ease, border-color 0.3s ease;
}

[data-theme="light"] header {
  background: rgba(247,246,243,0.92);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* 로고 */
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-fire {
  font-size: 22px;
  animation: pulse-fire 1.5s ease-in-out infinite;
}

@keyframes pulse-fire {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15) rotate(-5deg); }
}

.logo-text {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 20px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* SNS 버튼 (헤더) */
.header-sns {
  display: flex;
  gap: 8px;
  margin-left: auto;
  align-items: center;
}

.sns-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  border: 1px solid;
  transition: transform 0.2s, opacity 0.2s;
  flex-shrink: 0;
}

.sns-icon-btn:hover { transform: scale(1.1); opacity: 0.85; }

.sns-tg {
  background: var(--tg-bg);
  border-color: var(--tg-border);
  color: #2AABEE;
  font-size: 17px;
}

.sns-yt {
  background: var(--yt-bg);
  border-color: var(--yt-border);
  color: #FF0000;
  font-size: 17px;
}

/* 라이브 뱃지 */
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,45,45,0.1);
  border: 1px solid rgba(255,45,45,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
  flex-shrink: 0;
}

.live-dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* 타이머 */


/* 테마 토글 */
.theme-toggle {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--toggle-border);
  background: var(--toggle-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.theme-toggle:hover { transform: scale(1.08); }

/* ── STATS BAR ── */
.stats-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 2rem;
  transition: background 0.3s, border-color 0.3s;
}

.stats-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  gap: 2rem;
  align-items: center;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
}

.stat-num { font-weight: 700; color: var(--text); }
.stat-num.hot { color: var(--accent); }
.stat-num.green { color: var(--green); }

/* ── MAIN ── */
main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
  position: relative;
}

/* ── FILTER ── */
.filter-section {
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
}

.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }

.chip {
  background: var(--chip-bg);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
}

.chip:hover { border-color: var(--accent); color: var(--text); }

.chip.active {
  background: var(--chip-active-bg);
  border-color: var(--chip-active-border);
  color: var(--chip-active-color);
}

.sort-select {
  margin-left: auto;
  background: var(--chip-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  outline: none;
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}

/* ── GRID ── */
.deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

/* ── CARD ── */
.deal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: transform 0.25s ease, border-color 0.25s, box-shadow 0.25s, background 0.3s;
  position: relative;
  animation: card-in 0.4s ease both;
  display: flex;
  flex-direction: column;
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.deal-card:hover {
  transform: translateY(-5px);
  border-color: rgba(255,45,45,0.4);
  box-shadow: var(--card-shadow-hover);
}

.card-badges {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 5px;
  z-index: 2;
}

.badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  letter-spacing: 0.03em;
}

.badge-hot { background: var(--accent); color: white; }
.badge-new { background: var(--green); color: #000; }

.card-img-wrap {
  position: relative;
  aspect-ratio: 1/1;
  background: var(--bg3);
  overflow: hidden;
}

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.deal-card:hover .card-img { transform: scale(1.05); }

.card-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
}

.card-img-placeholder .ph-icon { font-size: 38px; }
.card-img-placeholder .ph-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--text3);
  font-family: 'Noto Sans KR', sans-serif;
}

.discount-overlay {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: var(--accent);
  color: white;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(255,45,45,0.4);
}

.card-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.card-seller {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
  font-weight: 500;
}

.card-title {
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-weight: 400;
  height: calc(13px * 1.55 * 2);  /* 2줄 높이 고정 */
  flex-shrink: 0;
}

.card-price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;  /* 제목~가격 사이 빈 공간 자동 채움 */
}

.price-left { display: flex; align-items: baseline; gap: 8px; }

.card-price {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.card-original {
  font-size: 12px;
  color: var(--text3);
  text-decoration: line-through;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  margin-top: 10px;
  border-top: 1px solid var(--border);
}

.card-time { font-size: 11px; color: var(--text3); }

.card-btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}

.card-btn:hover { opacity: 0.85; transform: scale(1.03); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, var(--skeleton-from) 25%, var(--skeleton-to) 50%, var(--skeleton-from) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeleton-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.sk-img { height: 240px; border-radius: 0; }
.sk-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.sk-line { height: 13px; }
.sk-line.s { width: 55%; }
.sk-price { height: 22px; width: 40%; }

/* ── EMPTY ── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--text3);
}

.empty-icon { font-size: 60px; margin-bottom: 1rem; }
.empty-text { font-size: 18px; color: var(--text2); }
.empty-sub { font-size: 13px; margin-top: 8px; }

/* ── FOOTER ── */
footer {
  background: var(--footer-bg);
  border-top: 1px solid var(--footer-border);
  padding: 3rem 2rem 2rem;
  transition: background 0.3s, border-color 0.3s;
}

.footer-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2rem;
  align-items: start;
}

.footer-brand .logo-text {
  font-size: 18px;
  display: block;
  margin-bottom: 10px;
}

.footer-desc {
  font-size: 13px;
  color: #666;
  line-height: 1.7;
  max-width: 320px;
}

.footer-sns-title {
  font-size: 11px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  font-weight: 500;
}

.footer-sns-list { display: flex; flex-direction: column; gap: 8px; }

.footer-sns-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: opacity 0.2s, transform 0.2s;
  border: 1px solid;
  width: 180px;
}

.footer-sns-btn:hover { opacity: 0.85; transform: translateX(3px); }

.footer-tg {
  background: rgba(42,171,238,0.1);
  border-color: rgba(42,171,238,0.3);
  color: #2AABEE;
}

.footer-yt {
  background: rgba(255,0,0,0.1);
  border-color: rgba(255,0,0,0.3);
  color: #FF4444;
}

.footer-bottom {
  max-width: 1400px;
  margin: 2rem auto 0;
  padding-top: 1.5rem;
  border-top: 1px solid #1e1e1e;
  font-size: 12px;
  color: #444;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.toast.show { transform: translateX(-50%) translateY(0); }


/* ── 검색창 ── */
.search-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 2rem 0;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,45,45,0.1);
}

.search-icon {
  padding: 0 14px;
  font-size: 18px;
  color: var(--text3);
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 14px 0;
  font-size: 15px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
}

.search-input::placeholder { color: var(--text3); }

.search-clear {
  padding: 0 14px;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  background: none;
  border: none;
  display: none;
  transition: color 0.2s;
}

.search-clear:hover { color: var(--accent); }

.search-result-label {
  font-size: 13px;
  color: var(--text2);
  margin-top: 10px;
  padding: 0 2px;
  min-height: 20px;
}

.search-result-label em {
  color: var(--accent);
  font-style: normal;
  font-weight: 700;
}

@media (max-width: 600px) {
  .search-wrap { padding: 1rem 1rem 0; }
  .search-input { font-size: 14px; padding: 12px 0; }
}

/* ── 무한스크롤 로더 ── */
.load-more-wrap {
  display: flex;
  justify-content: center;
  padding: 2rem 0;
}

.load-more-spinner {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--text3);
  font-size: 13px;
}

.spinner-dots {
  display: flex;
  gap: 6px;
}

.spinner-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}

.spinner-dot:nth-child(2) { animation-delay: 0.2s; }
.spinner-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.no-more-deals {
  display: none;
  text-align: center;
  padding: 1.5rem;
  font-size: 13px;
  color: var(--text3);
}

/* ── 인기 딜 랭킹 섹션 ── */
.hot-section { margin-bottom: 2rem; }
.hot-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.hot-section-title {
  display: flex;
  align-items: center;
  gap: 8px;

<script>
// 더미 데이터 제거 (실제 API 사용)

let allDeals=[], currentCat='', currentSort='latest', isSearching=false;
let currentPage=1, hasMore=true, isLoading=false, totalDeals=0;


function timeAgo(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return s+'초 전';
  if(s<3600) return Math.floor(s/60)+'분 전';
  if(s<86400) return Math.floor(s/3600)+'시간 전';
  return Math.floor(s/86400)+'일 전';
}

function getFreshness(d) {
  const s = Math.floor((Date.now()-new Date(d))/1000);
  if(s < 3600) return 'new';       // 1시간 이내
  if(s < 21600) return 'recent';   // 6시간 이내
  return 'old';
}

function nowStr(){
  const d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

function filtered(){
  let d=[...allDeals];
  if(currentSort==='discount') d.sort((a,b)=>b.discount-a.discount);
  else if(currentSort==='price_asc') d.sort((a,b)=>parseInt((a.price_text||'0').replace(/[^0-9]/g,''))-parseInt((b.price_text||'0').replace(/[^0-9]/g,'')));
  else if(currentSort==='price_desc') d.sort((a,b)=>parseInt((b.price_text||'0').replace(/[^0-9]/g,''))-parseInt((a.price_text||'0').replace(/[^0-9]/g,'')));
  else d.sort((a,b)=>new Date(b.last_seen_at)-new Date(a.last_seen_at));
  return d;
}

function renderCard(deal,idx){
  // ✅ DB 컬럼명에 맞게 수정
  const FALLBACK_IMAGES = {
    '전자제품': 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&q=80',
    '패션': 'https://images.unsplash.com/photo-1445205170230-053b83016050?w=400&q=80',
    '식품': 'https://images.unsplash.com/photo-1506617420156-8e4536971650?w=400&q=80',
    '생활용품': 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80',
    '뷰티': 'https://images.unsplash.com/photo-1522338242992-e1a54906a8da?w=400&q=80',
    '스포츠': 'https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=400&q=80',
    '기본': 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=400&q=80',
  };
  const imgUrl = deal.image_url || deal.image_source
    || FALLBACK_IMAGES[deal.category]
    || FALLBACK_IMAGES['기본'];
  const priceRaw = deal.price_text || '';
  const priceNum = parseInt(priceRaw.replace(/[^0-9]/g,''));
  const linkUrl = deal.affiliate_url || deal.source_url || deal.seller_url || '#';
  const title = deal.product_name || deal.title || '';
  const isNew = (Date.now()-new Date(deal.last_seen_at))<300000;
  const recCount = deal.recommendation_count || 0;
  const cmtCount = deal.comment_count || 0;
  return `
  <div class="deal-card" style="animation-delay:${idx*0.05}s" onclick="window.open('${linkUrl}','_blank')">
    <div class="card-badges">
      ${recCount>=10?'<span class="badge badge-hot">HOT</span>':''}
      ${isNew?'<span class="badge badge-new">NEW</span>':''}
    </div>
    <div class="card-img-wrap">
      <img class="card-img" src="${imgUrl}"
        alt="${title}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      >
      <div class="card-img-placeholder" style="display:none">
        <span class="ph-icon">🛒</span>
        <span class="ph-text">이미지 준비중</span>
      </div>
    </div>
    <div class="card-body">
      <div class="card-seller">${deal.seller_type||deal.source||''}</div>
      <div class="card-title">${title}</div>
      <div class="card-price-row">
        <div class="price-left">
          <span class="card-price">${isNaN(priceNum)?priceRaw:priceNum.toLocaleString()+'원'}</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="card-time-wrap">
          <span class="freshness-dot dot-${getFreshness(deal.last_seen_at)}"></span>
          <span class="card-time is-${getFreshness(deal.last_seen_at)}">${timeAgo(deal.last_seen_at)}</span>
          ${getFreshness(deal.last_seen_at)==='new'?'<span class="time-badge new">NEW</span>':''}
          ${recCount>=10&&getFreshness(deal.last_seen_at)!=='new'?'<span class="time-badge hot-rec">HOT</span>':''}
        </div>
        <div class="share-wrap">
          <button class="share-btn tg" title="텔레그램 공유" onclick="event.stopPropagation();shareTelegram('${title.replace(/'/g,"\\'")}','${linkUrl}')">✈</button>
          <button class="share-btn copy" title="링크 복사" onclick="event.stopPropagation();copyLink('${linkUrl}')">🔗</button>
          <button class="card-btn" onclick="event.stopPropagation();window.open('${linkUrl}','_blank')">구매 →</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderGrid(){
  const grid=document.getElementById('deals-grid');
  const label=document.getElementById('search-result-label');
  const data=filtered();
  if(!data.length){
    if(label) label.innerHTML = isSearching ? `검색 결과가 없어요 😢` : '';
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">😢</div><div class="empty-text">${isSearching?'검색 결과가 없어요':'해당 카테고리 딜이 없어요'}</div><div class="empty-sub">${isSearching?'다른 키워드로 검색해보세요':'다른 카테고리를 선택해 보세요'}</div></div>`;
    return;
  }
  grid.innerHTML=data.map((d,i)=>renderCard(d,i)).join('');
  document.getElementById('stat-count').textContent=totalDeals||allDeals.length;
  document.getElementById('stat-hot').textContent=allDeals.filter(d=>d.recommendation_count>=10).length;
  document.getElementById('stat-time').textContent=nowStr();
}

async function loadDeals(reset=true) {
  if(isLoading || (!hasMore && !reset)) return;
  if(reset) {
    currentPage=1;
    hasMore=true;
    allDeals=[];
  }
  isLoading=true;

  const spinner=document.getElementById('load-spinner');
  const noMore=document.getElementById('no-more');
  spinner.style.display='flex';
  noMore.style.display='none';

  try {
    const res = await fetch(API_URL + `/api/deals?page=${currentPage}&limit=40${currentCat?'&seller='+encodeURIComponent(currentCat):''}`);
    const data = await res.json();

    totalDeals = data.total;
    hasMore = data.has_more;
    currentPage++;

    if(reset) {
      allDeals = data.items;
      renderGrid();
      // 렌더링 완료 후 스피너 숨김
      requestAnimationFrame(() => {
        spinner.style.display='none';
        if(!hasMore) noMore.style.display='block';
        isLoading=false;
      });
    } else {
      const grid = document.getElementById('deals-grid');
      const startIdx = allDeals.length;
      allDeals = [...allDeals, ...data.items];
      const newCards = data.items.map((d,i)=>renderCard(d, startIdx+i)).join('');

      // 스피너 자리에 임시 div 삽입 → 카드 추가 → 스피너 숨김
      const tempDiv = document.createElement('div');
      grid.appendChild(tempDiv);
      tempDiv.outerHTML = newCards;

      document.getElementById('stat-count').textContent=data.total;

      // 이미지 포함 실제 페인트 완료 후 숨김
      setTimeout(() => {
        spinner.style.display='none';
        if(!hasMore) noMore.style.display='block';
        isLoading=false;
      }, 100);
    }

  } catch(e) {
    console.error('로드 실패:', e);
    spinner.style.display='none';
    isLoading=false;
  }
}

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}



// 테마 토글
const toggleBtn=document.getElementById('theme-toggle');
toggleBtn.addEventListener('click',()=>{
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  toggleBtn.textContent=isDark?'🌙':'☀️';
});

// 필터
// 카테고리 칩 클릭 (동적으로 생성되므로 이벤트 위임)
document.getElementById('filter-chips').addEventListener('click', e=>{
  const btn = e.target.closest('.chip');
  if(!btn) return;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  loadDeals(true);
});

document.getElementById('sort-select').addEventListener('change',e=>{
  currentSort=e.target.value;
  renderGrid();
});

// ── API BASE URL ──
const API_URL = 'https://one0hotdeal.onrender.com';

// ── 공유 함수 ──
function shareTelegram(title, url) {
  const text = encodeURIComponent(title + '\n\n' + url + '\n\n🔥 더 많은 핫딜 → https://hot.hongzi.us');
  window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + text, '_blank');
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const t = document.getElementById('copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  });
}

// ── 인기 딜 랭킹 로드 ──
async function loadHotDeals() {
  try {
    const res = await fetch(API_URL + '/api/deals?page=1&limit=20&sort=hot');
    const data = await res.json();
    const top5 = [...data.items]
      .sort((a,b)=>(b.recommendation_count||0)-(a.recommendation_count||0))
      .slice(0,5);
    if(!top5.length) return;

    const rankClass = ['r1','r2','r3','rn','rn'];
    const grid = document.getElementById('hot-grid');
    grid.innerHTML = top5.map((deal, i) => {
      const img = deal.image_url || '';
      const title = deal.product_name || deal.title || '';
      const price = parseInt((deal.price_text||'0').replace(/[^0-9]/g,''));
      const link = deal.affiliate_url || deal.source_url || '#';
      return `
      <div class="hot-card ${i===0?'rank-1':''}" onclick="window.open('${link}','_blank')">
        <div class="hot-rank ${rankClass[i]}">${i+1}</div>
        <div class="hot-card-img">
          ${img
            ? `<img src="${img}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=ph>🛒</div>'">`
            : `<div class="ph">🛒</div>`}
        </div>
        <div class="hot-card-body">
          <div class="hot-card-seller">${deal.seller_type||''}</div>
          <div class="hot-card-title">${title}</div>
          <div class="hot-card-price">${isNaN(price)?deal.price_text:price.toLocaleString()+'원'}</div>
          <div class="hot-card-stats">
            👍 ${deal.recommendation_count||0} &nbsp; 💬 ${deal.comment_count||0}
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('hot-section').style.display = 'block';
    document.getElementById('section-divider').style.display = 'block';
    document.getElementById('latest-title').style.display = 'flex';
  } catch(e) {
    console.error('인기딜 로드 실패:', e);
  }
}

// ── 카테고리 동적 로드 ──
async function loadCategories() {
  try {
    const res = await fetch(API_URL + '/api/categories');
    const cats = await res.json();
    const wrap = document.getElementById('filter-chips');
    const extra = cats.map(c =>
      `<button class="chip" data-cat="${c}">${c}</button>`
    ).join('');
    wrap.innerHTML = '<button class="chip active" data-cat="">전체</button>' + extra;
  } catch(e) {
    console.error('카테고리 로드 실패:', e);
  }
}

// ── 티커 로드 ──
async function loadTicker() {
  try {
    const res = await fetch(API_URL + '/api/ticker');
    const items = await res.json();
    if (!items || !items.length) return;
    const ICONS = ['🔥','⚡','🛒','💥','🎯','💸','🏷️','✨'];
    // 무한루프를 위해 2배 복제
    const all = [...items, ...items];
    const html = all.map((d, i) => {
      const icon = ICONS[i % ICONS.length];
      const title = (d.product_name || d.title || '').slice(0, 22);
      const price = d.price_text ? d.price_text : '';
      return `<span class="ticker-item">${icon} ${title} <span class="ticker-sep">|</span> ${price}</span>`;
    }).join('');
    document.getElementById('ticker-track').innerHTML = html;
  } catch(e) {
    console.error('티커 로드 실패:', e);
  }
}


// ── 검색 ──
let searchTimer = null;

async function searchDeals(q) {
  const grid = document.getElementById('deals-grid');
  const label = document.getElementById('search-result-label');

  // 로딩 표시
  document.getElementById('hot-section').style.display='none';
  document.getElementById('section-divider').style.display='none';
  document.getElementById('latest-title').style.display='none';
  grid.innerHTML = `
    ${[...Array(4)].map(()=>`
    <div class="skeleton-card">
      <div class="skeleton sk-img"></div>
      <div class="sk-body">
        <div class="skeleton sk-line s"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-price"></div>
      </div>
    </div>`).join('')}`;

  try {
    const res = await fetch(API_URL + '/api/search?q=' + encodeURIComponent(q));
    if (!res.ok) throw new Error();
    allDeals = await res.json();
    isSearching = true;
    if(label) label.innerHTML = `<em>${q}</em> 검색 결과 ${allDeals.length}개`;
    renderGrid();
  } catch(e) {
    if(label) label.innerHTML = '검색 중 오류가 발생했어요';
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">검색 중 오류가 발생했어요</div></div>`;
  }
}

function clearSearch() {
  const input = document.getElementById('search-input');
  const clearBtn = document.getElementById('search-clear');
  const label = document.getElementById('search-result-label');
  input.value = '';
  clearBtn.style.display = 'none';
  if(label) label.innerHTML = '';
  isSearching = false;
  loadDeals(true);
  loadHotDeals();
}

// 검색 입력 이벤트
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim();
  const clearBtn = document.getElementById('search-clear');
  clearBtn.style.display = q ? 'block' : 'none';

  clearTimeout(searchTimer);
  if (q.length >= 2) {
    // 500ms 디바운스 (타이핑 멈추면 검색)
    searchTimer = setTimeout(() => searchDeals(q), 500);
  } else if (q.length === 0) {
    clearSearch();
  }
});

// X 버튼
document.getElementById('search-clear').addEventListener('click', clearSearch);

// 엔터키
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q.length >= 2) {
      clearTimeout(searchTimer);
      searchDeals(q);
    }
  }
});

// ── 무한스크롤 스크롤 이벤트 방식 ──
function onScroll() {
  if(isSearching || !hasMore || isLoading) return;
  const scrollY = window.scrollY || window.pageYOffset;
  const windowH = window.innerHeight;
  const docH = document.documentElement.scrollHeight;
  // 하단 400px 전에 미리 로드
  if(scrollY + windowH >= docH - 400) {
    loadDeals(false);
  }
}

window.addEventListener('scroll', onScroll, { passive: true });

setTimeout(()=>{loadCategories();loadTicker();loadDeals(true);loadHotDeals();},700);
</script>
